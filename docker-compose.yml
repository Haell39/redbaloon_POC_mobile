services:
  identity-service:
    build: .
    container_name: identity-service
    ports:
      - "8000:8000"
    volumes:
      # Permite atualizar PKLs / tabelas sem rebuild de imagem
      - ./database:/app/database
      - ./database_equip:/app/database_equip
      - ./tabelas:/app/tabelas
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
