<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Autorização Selfie — Test Client</title>
    <style>
      /* ── Reset & Base ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --accent: #6c5ce7;
        --success: #00b894;
        --warning: #fdcb6e;
        --danger: #d63031;
        --text: #f0f0f0;
        --muted: #8a8a9a;
        --radius: 16px;
      }

      html,
      body {
        height: 100%;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
      }

      /* ── Layout ── */
      .app {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
        max-width: 480px;
        margin: 0 auto;
        padding: 16px 12px;
        gap: 12px;
      }

      /* ── Header ── */
      header {
        text-align: center;
      }
      header h1 {
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.3px;
      }
      header p {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .badge {
        display: inline-block;
        margin-top: 6px;
        padding: 3px 10px;
        font-size: 0.65rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        border-radius: 20px;
        background: rgba(108, 92, 231, 0.2);
        color: var(--accent);
        border: 1px solid rgba(108, 92, 231, 0.3);
      }

      /* ── Viewfinder ── */
      .viewfinder {
        flex: 1;
        min-height: 280px;
        position: relative;
        border-radius: var(--radius);
        overflow: hidden;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255, 255, 255, 0.06);
      }

      .viewfinder video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
      }

      /* Corner overlays */
      .viewfinder::before,
      .viewfinder::after {
        content: "";
        position: absolute;
        width: 60px;
        height: 60px;
        border: 3px solid var(--accent);
        pointer-events: none;
        z-index: 2;
      }
      .viewfinder::before {
        top: 12px;
        left: 12px;
        border-right: none;
        border-bottom: none;
        border-radius: 8px 0 0 0;
      }
      .viewfinder::after {
        top: 12px;
        right: 12px;
        border-left: none;
        border-bottom: none;
        border-radius: 0 8px 0 0;
      }

      .corner-bl,
      .corner-br {
        position: absolute;
        width: 60px;
        height: 60px;
        border: 3px solid var(--accent);
        pointer-events: none;
        z-index: 2;
      }
      .corner-bl {
        bottom: 12px;
        left: 12px;
        border-right: none;
        border-top: none;
        border-radius: 0 0 0 8px;
      }
      .corner-br {
        bottom: 12px;
        right: 12px;
        border-left: none;
        border-top: none;
        border-radius: 0 0 8px 0;
      }

      .viewfinder .placeholder {
        color: var(--muted);
        font-size: 0.85rem;
      }

      /* ── Buttons ── */
      .actions {
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }
      .btn {
        flex: 1;
        padding: 16px;
        font-size: 1.05rem;
        font-weight: 700;
        border: none;
        border-radius: var(--radius);
        color: #fff;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        letter-spacing: 0.3px;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--accent);
      }
      .btn-secondary {
        flex: 0 0 auto;
        padding: 16px 20px;
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 1.1rem;
      }

      /* ── Result card ── */
      .result {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 18px;
        border-radius: var(--radius);
        background: var(--surface);
        text-align: center;
        flex-shrink: 0;
        animation: fadeUp 0.3s ease;
      }
      .result.show {
        display: flex;
      }
      .result.success {
        border: 2px solid var(--success);
      }
      .result.warning {
        border: 2px solid var(--warning);
      }
      .result.error {
        border: 2px solid var(--danger);
      }

      .result .icon {
        font-size: 2.2rem;
      }
      .result .name {
        font-size: 1.15rem;
        font-weight: 700;
      }
      .result .confidence {
        font-size: 0.82rem;
        color: var(--muted);
      }
      .result .message {
        font-size: 0.78rem;
        color: var(--muted);
        font-style: italic;
        margin-top: 2px;
      }

      .result img.snap {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        object-fit: cover;
        margin-top: 4px;
      }
      .result.success img.snap {
        border: 3px solid var(--success);
      }
      .result.warning img.snap {
        border: 3px solid var(--warning);
      }
      .result.error img.snap {
        border: 3px solid var(--danger);
      }

      /* ── Status bar ── */
      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        border-radius: 10px;
        background: var(--surface);
        font-size: 0.72rem;
        color: var(--muted);
      }
      .status-bar .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        display: inline-block;
        margin-right: 5px;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Spinner ── */
      .spinner {
        display: none;
        width: 28px;
        height: 28px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin: 0 auto;
      }
      .spinner.show {
        display: block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header>
        <h1>🔐 Autorização Selfie</h1>
        <p>Posicione seu rosto e toque em validar</p>
        <span class="badge">Test Client v0.2</span>
      </header>

      <!-- Status bar -->
      <div class="status-bar">
        <span
          ><span class="dot" id="statusDot"></span
          ><span id="statusText">Conectando…</span></span
        >
        <span id="usersCount">—</span>
      </div>

      <!-- Camera -->
      <div class="viewfinder">
        <video id="video" autoplay playsinline muted></video>
        <span class="placeholder" id="placeholder">Carregando câmera…</span>
        <div class="corner-bl"></div>
        <div class="corner-br"></div>
      </div>

      <!-- Hidden canvas -->
      <canvas id="canvas" style="display: none"></canvas>

      <!-- Result -->
      <div class="result" id="result">
        <span class="icon" id="resultIcon"></span>
        <img class="snap" id="resultSnap" alt="selfie" />
        <span class="name" id="resultName"></span>
        <span class="confidence" id="resultConf"></span>
        <span class="message" id="resultMsg"></span>
      </div>

      <!-- Spinner -->
      <div class="spinner" id="spinner"></div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" id="btnVerify" disabled>
          📸 VALIDAR ACESSO
        </button>
        <button
          class="btn btn-secondary"
          id="btnRefresh"
          title="Atualizar base de dados"
        >
          🔄
        </button>
      </div>
    </div>

    <script>
      (() => {
        /* ── DOM refs ── */
        const video = document.getElementById("video");
        const canvas = document.getElementById("canvas");
        const btnVerify = document.getElementById("btnVerify");
        const btnRefresh = document.getElementById("btnRefresh");
        const placeholder = document.getElementById("placeholder");
        const spinner = document.getElementById("spinner");
        const statusDot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        const usersCount = document.getElementById("usersCount");
        const resultDiv = document.getElementById("result");
        const resultIcon = document.getElementById("resultIcon");
        const resultSnap = document.getElementById("resultSnap");
        const resultName = document.getElementById("resultName");
        const resultConf = document.getElementById("resultConf");
        const resultMsg = document.getElementById("resultMsg");

        /* ── Fetch registered users (status check) ── */
        async function fetchStatus() {
          try {
            const res = await fetch("/users");
            const data = await res.json();
            const n = data.users.length;
            statusDot.style.background =
              n > 0 ? "var(--success)" : "var(--warning)";
            statusText.textContent = n > 0 ? "API Online" : "Sem cadastros";
            usersCount.textContent = n + " cadastrado(s)";
          } catch {
            statusDot.style.background = "var(--danger)";
            statusText.textContent = "API Offline";
            usersCount.textContent = "—";
          }
        }

        /* ── Camera ── */
        async function startCamera() {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: "user",
                width: { ideal: 720 },
                height: { ideal: 1280 },
              },
              audio: false,
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
              placeholder.style.display = "none";
              btnVerify.disabled = false;
            };
          } catch {
            placeholder.textContent = "⚠ Câmera não disponível";
          }
        }

        /* ── Capture frame → Blob (simula o que o Angular fará) ── */
        function captureFrame() {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          const ctx = canvas.getContext("2d");
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(video, 0, 0);
          return new Promise((resolve) =>
            canvas.toBlob(resolve, "image/jpeg", 0.9),
          );
        }

        /* ── Render result card ── */
        function showResult({ match, name, confidence, message, snapUrl }) {
          resultDiv.classList.remove("show", "success", "warning", "error");

          let tier;
          if (match) {
            tier = "success";
          } else if (confidence >= 0.5) {
            tier = "warning";
          } else {
            tier = "error";
          }

          resultDiv.classList.add("show", tier);

          const icons = { success: "✅", warning: "⚠️", error: "❌" };
          resultIcon.textContent = icons[tier];
          resultName.textContent = name;
          resultConf.textContent =
            confidence > 0
              ? `Confiança: ${(confidence * 100).toFixed(1)}%`
              : "";
          resultMsg.textContent = message || "";

          if (snapUrl) resultSnap.src = snapUrl;
          resultSnap.style.display = snapUrl ? "block" : "none";
        }

        /* ── Verify click ── */
        btnVerify.addEventListener("click", async () => {
          btnVerify.disabled = true;
          resultDiv.classList.remove("show");
          spinner.classList.add("show");

          try {
            const blob = await captureFrame();
            const snapUrl = URL.createObjectURL(blob);
            const form = new FormData();
            form.append("file", blob, "selfie.jpg");

            const res = await fetch("/verify", { method: "POST", body: form });
            const data = await res.json();

            showResult({ ...data, snapUrl });
          } catch {
            showResult({
              match: false,
              name: "Erro de conexão",
              confidence: 0,
              message: "Servidor indisponível.",
              snapUrl: "",
            });
          } finally {
            spinner.classList.remove("show");
            btnVerify.disabled = false;
          }
        });

        /* ── Refresh DB click ── */
        btnRefresh.addEventListener("click", async () => {
          btnRefresh.disabled = true;
          try {
            const res = await fetch("/refresh-db");
            const data = await res.json();
            alert(data.message);
            fetchStatus();
          } catch {
            alert("Erro ao atualizar base de dados.");
          } finally {
            btnRefresh.disabled = false;
          }
        });

        /* ── Boot ── */
        startCamera();
        fetchStatus();
      })();
    </script>
  </body>
</html>
